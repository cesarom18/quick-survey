services:
    backend:
        build: ./backend
        container_name: api
        ports:
            - "8000:8000"
        volumes:
            - ./backend:/app
        depends_on:
            - db
    frontend:
        build: ./frontend
        env_file:
            - ./frontend/.env
        container_name: react
        ports:
            - "5173:5173"
        volumes:
            - ./frontend:/src
        depends_on:
            - backend
    db:
        image: mysql:8
        container_name: mysql_db
        restart: always
        environment:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: quick_survey
          MYSQL_USER: user
          MYSQL_PASSWORD: password
        ports:
          - "3306:3306"
        volumes:
          - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
